services:
  - type: web
    name: rana-awais-backend
    runtime: go
    rootDir: rana-awais-backend
    buildCommand: go build -tags netgo -ldflags '-s -w' -o app
    startCommand: ./app
    envVars:
      - key: SERVER_PORT
        value: 8080
      - key: DB_NAME
        value: rana_awais_erp
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
